<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3 border-bottom">
  <div class="container">

    <a class="navbar-brand" routerLink="/">
      <img alt="logo" height="32" ngSrc="./assets/paw.svg" width="32">
      {{ appTitle }}
    </a>
    <button (click)="isCollapsed = !isCollapsed" class="navbar-toggler" type="button">
      &#9776;
    </button>

    <div [ngbCollapse]="isCollapsed" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        @if (!authService.user()) {
          <li class="nav-item" [routerLinkActive]="['active']">
            <a class="nav-link" routerLink="home" (click)="isCollapsed = true">Home</a>
          </li>
          <li class="nav-item" [routerLinkActive]="['active']">
            <a class="nav-link" routerLink="auth/register" (click)="isCollapsed = true">Register</a>
          </li>
          <li class="nav-item" [routerLinkActive]="['active']">
            <a class="nav-link" routerLink="auth/login" (click)="isCollapsed = true">Login</a>
          </li>
        } @else {
          <li class="nav-item" [routerLinkActive]="['active']">
            <a class="nav-link" routerLink="dashboard" (click)="isCollapsed = true">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" (click)="authService.logout()">Logout</a>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
